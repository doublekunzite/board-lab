<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board Lab | Climbing Movement Archive</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧗🏽‍♂️</text></svg>" type="image/svg+xml">

<body>
  <div class="bg-atmosphere" aria-hidden="true"></div>
  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="holds-container" aria-hidden="true" id="holdsContainer"></div>

  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <a href="index.html" class="logo font-display">BOARD LAB</a>
      <nav>
        <ul class="nav-links">
          <li><a href="#moves" class="nav-link">Moves</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <section class="hero-section">
      <h1 class="hero-title font-display">
        <span>BOARD</span>
        <span class="accent-line">MOVES</span>
      </h1>
      <p class="hero-subtitle">A visual archive of<br> 
	  board climbing movements</p>
    </section>

    <section class="moves-section" id="moves">
      <header class="section-header">
        <h2 class="section-title font-display">THE ARCHIVE</h2>
      </header>
      <div class="moves-grid" id="movesGrid"></div>
    </section>
  </main>

  <footer class="site-footer">BOARD LAB</footer>

  <script>
    // ============================================
    // 1. MOVE CARDS (Index Page Only)
    // ============================================
    // Only run this if the grid exists (prevents errors on detail pages)
    const movesGrid = document.getElementById('movesGrid');
    if (movesGrid) {
        const movesData = [
            { id: 'cross-rose', title: 'Cross / Rose', desc: 'Crossing through to a hold on the opposite side.' },
            { id: 'drop-knee', title: 'Drop Knee', desc: 'Dropping the inside knee to extend reach.' },
            { id: 'flag', title: 'Flag', desc: 'Extending a leg for counterbalance.' },
            { id: 'smear', title: 'Smear', desc: 'Using the foot on the wall surface.' },
            { id: 'gaston', title: 'Gaston', desc: 'Pressing outward on a hold.' },
            { id: 'deadpoint', title: 'Deadpoint', desc: 'Timing a grab at the apex of momentum.' },
            { id: 'heel-hook', title: 'Heel Hook', desc: 'Using the heel to pull.' },
            { id: 'toe-hook', title: 'Toe Hook', desc: 'Hooking the foot to create tension.' },
            { id: 'layback', title: 'Layback', desc: 'Leaning away to generate force.' },
            { id: 'feet-pinch', title: 'Feet Pinch', desc: 'Squeezing a hold between feet.' },
            { id: 'foot-swap', title: 'Foot Swap', desc: 'Switching feet efficiently.' },
            { id: 'campus', title: 'Campus', desc: 'Moving hands without feet.' }
        ];

        let html = '';
        movesData.forEach((move, i) => {
            html += `<a href="moves/${move.id}.html" class="move-card" style="transition-delay:${i*0.05}s">
                <div class="move-card-content">
                    <h3 class="move-card-title">${move.title}
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </h3>
                    <p class="move-card-desc">${move.desc}</p>
                </div>
            </a>`;
        });
        movesGrid.innerHTML = html;

        // Reveal animation observer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.move-card').forEach(c => observer.observe(c));
    }

            const shapeIndex = i % shapes.length;
            hold.innerHTML = shapes[shapeIndex];

            // Random Position
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            
            // Random Animation Settings
            const duration = 20 + Math.random() * 20; // 20s - 40s
            const delay = Math.random() * -20; // Start at random point in cycle
            const rotation = Math.random() * 360;
            const driftX = -30 + Math.random() * 60;
            const driftY = -30 + Math.random() * 60;
            
            // Opacity: 0.15 (subtle) to 0.35 (visible)
            const opacity = 0.15 + Math.random() * 0.2;

            hold.style.cssText = `
                left: ${x}%; 
                top: ${y}%; 
                width: ${60 + Math.random() * 40}px; 
                height: auto;
                --hold-opacity: ${opacity};
                --float-duration: ${duration}s;
                --float-delay: ${delay}s;
                --start-rotation: ${rotation}deg;
                --drift-x: ${driftX}px;
                --drift-y: ${driftY}px;
            `;

        }

    // ============================================
    // 3. MOUSE PARALLAX EFFECT
    // ============================================
    function initParallax() {
        const container = document.getElementById('holdsContainer');
        if (!container) return;

        // Current position
        let currentX = 0;
        let currentY = 0;
        // Target position from mouse
        let targetX = 0;
        let targetY = 0;

        // Listen for mouse movement
        document.addEventListener('mousemove', (e) => {
            // Calculate how far the mouse is from the center (0 to 1)
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            // Move max 30px in either direction
            targetX = ((e.clientX - centerX) / centerX) * 30;
            targetY = ((e.clientY - centerY) / centerY) * 30;
        });

        // Animation loop to smooth the movement
        function animate() {
            // Lerp (Linear Interpolation) for smoothness
            currentX += (targetX - currentX) * 0.05;
            currentY += (targetY - currentY) * 0.05;

            container.style.transform = `translate(${currentX}px, ${currentY}px)`;

            requestAnimationFrame(animate);
        }

        animate();
    }

    // ============================================
    // 4. HEADER SCROLL & INIT
    // ============================================
    const header = document.getElementById('siteHeader');
    window.addEventListener('scroll', () => {
        if (window.pageYOffset > 100) header.classList.add('scrolled');
        else header.classList.remove('scrolled');
    }, { passive: true });

    // Initialize
    generateClimbingHolds();
    initParallax();
</script>
