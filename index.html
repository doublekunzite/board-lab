<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board Lab | Climbing Movement Archive</title>
  <link rel="stylesheet" href="style.css">
  <style>
  /* ============================================
     INDEX PAGE ONLY FIXES
     ============================================ */
  
  /* Force all category containers to never clip content */
  .index-page .moves-section,
  .index-page #movesGrid,
  .index-page .category-section,
  .index-page .category-section * {
    overflow: visible !important;
    clip-path: none !important;
    mask: none !important;
  }

  /* Ensure the title has enough height and is not collapsed */
  .index-page .category-title {
    display: block !important;
    min-height: auto !important;
    height: auto !important;
    max-height: none !important;
    line-height: 1.4 !important;
    margin-top: 2rem !important;
    margin-bottom: 1.5rem !important;
    padding: 0.5rem 0 !important;
    background: transparent;
    transform: none !important;
    position: relative;
    z-index: 5;
  }

  /* Optional: add a fallback color if needed */
  .index-page .category-title {
    color: #f5f2ed !important;
  }

  /* Ensure category sections don't clip children */
  .index-page .category-section {
    overflow: visible;
    position: relative;
    clear: both;
  }
</style>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧗🏽‍♂️</text></svg>" type="image/svg+xml">
</head>
<body class="index page">
  <div class="bg-atmosphere" aria-hidden="true"></div>
  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="holds-container" aria-hidden="true" id="holdsContainer"></div>

  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <a href="index.html" class="logo font-display">BOARD LAB</a>
      <nav>
        <ul class="nav-links">
          <li><a href="#moves" class="nav-link">Moves</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <section class="hero-section">
      <h1 class="hero-title font-display">
        <span>BOARD</span>
        <span class="accent-line">MOVES</span>
      </h1>
      <p class="hero-subtitle">A visual archive of<br> 
      board climbing movements</p>
    </section>
	
	 <!-- NEW SECTION: Concepts -->
        <section class="moves-section" id="concepts">
            <div class="category-section">
                <h2 class="category-title">Concepts & Analysis</h2>
                <div class="cards-grid" id="conceptsGrid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </section>

    <section class="moves-section" id="moves">
      
      <div class="cards-grid" id="movesGrid"></div>
    </section>
  </main>

  <footer class="site-footer">BOARD LAB</footer>

  <script>
    // ============================================
    // 1. DATA SETUP
    // ============================================
    
    // NEW: Concepts Data
    const conceptsData = [
        { 
            id: 'hold-quality', 
            title: 'Hold Quality', 
            desc: 'An interactive diagram of geometry, friction, and grip.' 
        }
    ];

    // EXISTING: Moves Data (Defined ONCE)
    const movesData = [
        { id: 'cross-rose', title: 'Cross / Rose', desc: 'Crossing an arm over or through the other.', category: 'grip-type' },
        { id: 'drop-knee', title: 'Drop Knee', desc: 'Twisting the leg to put more force through a foothold.', category: 'footwork' },
        { id: 'flag', title: 'Flag', desc: 'Extending a leg for counterbalance.', category: 'footwork' },
        { id: 'smear', title: 'Smear', desc: 'Using the foot on the wall surface.', category: 'footwork' },
        { id: 'kicking', title: 'Kicking the Wall', desc: 'Kicking the wall to stop rotation or swing.', category: 'dynamic' },
        { id: 'gaston', title: 'Gaston', desc: 'Pressing outward on a hold.', category: 'grip-type' },
        { id: 'deadpoint', title: 'Deadpoint', desc: 'Timing a grab at the apex of momentum.', category: 'dynamic' },
        { id: 'heel-hook', title: 'Heel Hook', desc: 'Using the heel to pull.', category: 'footwork' },
        { id: 'toe-hook', title: 'Toe Hook', desc: 'Using the toe to pull.', category: 'footwork' },
        { id: 'layback', title: 'Layback', desc: 'Holding tension between a gaston/sidepull and a high foot.', category: 'grip-type' },
        { id: 'feet-pinch', title: 'Bicycle / Feet Pinch', desc: 'Squeezing a hold between feet.', category: 'footwork' },
        { id: 'foot-swap', title: 'Foot Swap', desc: 'Switching feet efficiently.', category: 'footwork' },
        { id: 'campus', title: 'Campus', desc: 'Moving hands without feet.', category: 'dynamic' },
        { id: 'grip-adjust', title: 'Grip Adjustment', desc: 'Adjusting the grip on a hold.', category: 'grip-type' },
        { id: 'pogo', title: 'Pogo', desc: 'Swinging a leg or arm to generate momentum.', category: 'dynamic' },
        { id: 'drag', title: '3-Finger Drag', desc: 'An open-hand grip using 3 extended fingers.', category: 'grip-type' }
    ];

    const categories = [
        { key: 'dynamic', title: 'Dynamic' },
        { key: 'footwork', title: 'Footwork' },
        { key: 'grip-type', title: 'Grips & Techniques' }
    ];

    // ============================================
    // 2. RENDER FUNCTIONS
    // ============================================

    // A. Render Concepts (Simple Grid)
    function renderConcepts() {
        const grid = document.getElementById('conceptsGrid');
        if (!grid) return;

        let html = '';
        conceptsData.forEach((move, i) => {
            // Links to root folder (e.g. hold-quality.html)
            html += `<a href="${move.id}.html" class="move-card" style="transition-delay:${i*0.05}s">
                <div class="move-card-content">
                    <h3 class="move-card-title">${move.title}
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </h3>
                    <p class="move-card-desc">${move.desc}</p>
                </div>
            </a>`;
        });
        grid.innerHTML = html;
    }

    // B. Render Moves (Grouped by Category)
    function renderGroupedMoves() {
        const movesGrid = document.getElementById('movesGrid');
        if (!movesGrid) return;

        let fullHtml = '';

        categories.forEach(cat => {
            const filteredMoves = movesData.filter(m => m.category === cat.key);

            if (filteredMoves.length > 0) {
                fullHtml += `<div class="category-section">
                    <h3 class="category-title font-display">${cat.title}</h3>
                    <div class="cards-grid">`; 
                    
                    filteredMoves.forEach((move, i) => {
                        // Links to moves/ folder
                        fullHtml += `<a href="moves/${move.id}.html" class="move-card" style="transition-delay:${i*0.05}s">
                            <div class="move-card-content">
                                <h4 class="move-card-title">${move.title}
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                                </h4>
                                <p class="move-card-desc">${move.desc}</p>
                            </div>
                        </a>`;
                    });

                fullHtml += `</div></div>`;
            }
        });

        movesGrid.innerHTML = fullHtml;
    }

    // C. Observe Cards for Animation
    function observeCards() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.move-card').forEach(c => observer.observe(c));
    }

    // ============================================
    // 3. INITIALIZE
    // ============================================
    renderConcepts();
    renderGroupedMoves();
    observeCards();

    // ============================================
    // 4. FLOATING HOLDS (Existing Code)
    // ============================================
   function generateClimbingHolds() {
        const container = document.getElementById('holdsContainer');
        if (!container) return;
        
        const shapes = [
            // ... (Your existing SVG shapes go here, I won't reprint them to save space) ...
            // MAKE SURE YOU KEEP YOUR shapes ARRAY HERE
        ];

        const holdCount = 10;

        for (let i = 0; i < holdCount; i++) {
            const hold = document.createElement('div');
            hold.className = 'climbing-hold';
            // ... (Rest of your existing hold generation logic) ...
            container.appendChild(hold);
        }
    }

    function initParallax() {
        // ... (Your existing parallax code) ...
    }

    const header = document.getElementById('siteHeader');
    window.addEventListener('scroll', () => {
        if (window.pageYOffset > 100) header.classList.add('scrolled');
        else header.classList.remove('scrolled');
    }, { passive: true });

    generateClimbingHolds();
    initParallax();
</script>
</body>
</html>
