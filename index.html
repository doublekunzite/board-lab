<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board Lab | Climbing Movement Archive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-atmosphere" aria-hidden="true"></div>
  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="holds-container" aria-hidden="true" id="holdsContainer"></div>

  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <a href="index.html" class="logo font-display">BOARD LAB</a>
      <nav>
        <ul class="nav-links">
          <li><a href="#moves" class="nav-link">Moves</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <section class="hero-section">
      <h1 class="hero-title font-display">
        <span>BOARD</span>
        <span class="accent-line">MOVES</span>
      </h1>
      <p class="hero-subtitle">A visual archive of board climbing movements</p>
    </section>

    <section class="moves-section" id="moves">
      <header class="section-header">
        <h2 class="section-title font-display">THE ARCHIVE</h2>
      </header>
      <div class="moves-grid" id="movesGrid"></div>
    </section>
  </main>

  <footer class="site-footer">BOARD LAB</footer>

  <script>
    // DATA
    const movesData = [
      { id: 'cross-rose', title: 'Cross / Rose', desc: 'Crossing through to a hold on the opposite side.' },
      { id: 'drop-knee', title: 'Drop Knee', desc: 'Dropping the inside knee to extend reach.' },
      { id: 'flag', title: 'Flag', desc: 'Extending a leg for counterbalance.' },
      { id: 'smear', title: 'Smear', desc: 'Using the foot on the wall surface.' },
      { id: 'gaston', title: 'Gaston', desc: 'Pressing outward on a hold.' },
      { id: 'deadpoint', title: 'Deadpoint', desc: 'Timing a grab at the apex of momentum.' },
      { id: 'heel-hook', title: 'Heel Hook', desc: 'Using the heel to pull.' },
      { id: 'toe-hook', title: 'Toe Hook', desc: 'Hooking the foot to create tension.' },
      { id: 'layback', title: 'Layback', desc: 'Leaning away to generate force.' },
      { id: 'feet-pinch', title: 'Feet Pinch', desc: 'Squeezing a hold between feet.' },
      { id: 'foot-swap', title: 'Foot Swap', desc: 'Switching feet efficiently.' },
      { id: 'campus', title: 'Campus', desc: 'Moving hands without feet.' }
    ];

    // 1. RENDER CARDS
    function renderMoveCards() {
      const grid = document.getElementById('movesGrid');
      if(!grid) return;
      let html = '';
      movesData.forEach((move, i) => {
        html += `<a href="moves/${move.id}.html" class="move-card" style="transition-delay:${i*0.05}s">
          <div class="move-card-content">
            <h3 class="move-card-title">${move.title}
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </h3>
            <p class="move-card-desc">${move.desc}</p>
          </div>
        </a>`;
      });
      grid.innerHTML = html;
      requestAnimationFrame(observeMoveCards);
    }

    function observeMoveCards() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.1 });
      document.querySelectorAll('.move-card').forEach(c => observer.observe(c));
    }

    // 2. GENERATE HOLDS (Fixed Visibility)
    function generateHolds() {
      const container = document.getElementById('holdsContainer');
      if(!container) return;
      
      const shapes = [
        `<svg viewBox="0 0 100 80"><path d="M85 40c0 22-15 38-35 38S15 62 15 40s15-38 35-38 35 16 35 38z" fill="#4a4a50" /><ellipse cx="50" cy="40" rx="10" ry="8" fill="#1a1a1d" /></svg>`,
        `<svg viewBox="0 0 120 35"><rect x="5" y="5" width="110" height="25" rx="6" fill="#4a4a50" /><circle cx="35" cy="17" r="4" fill="#1a1a1d" /></svg>`,
        `<svg viewBox="0 0 45 100"><path d="M22.5 5c10 0 17.5 20 17.5 45s-7.5 45-17.5 45S5 75 5 50 12.5 5 22.5 5z" fill="#4a4a50" /><ellipse cx="22.5" cy="50" rx="5" ry="10" fill="#1a1a1d" /></svg>`,
        `<svg viewBox="0 0 100 50"><path d="M10 45 C10 10, 90 10, 90 45 L90 50 L10 50 Z" fill="#4a4a50" /><circle cx="50" cy="35" r="5" fill="#1a1a1d" /></svg>`,
        `<svg viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="#4a4a50" /><circle cx="25" cy="25" r="8" fill="#0a0a0b" /></svg>`,
        `<svg viewBox="0 0 100 90"><path d="M50 5 L95 45 L75 85 L25 85 L5 45 Z" fill="#4a4a50" /><circle cx="50" cy="50" r="6" fill="#1a1a1d" /></svg>`
      ];

      for(let i=0; i<12; i++) {
        const div = document.createElement('div');
        div.className = 'climbing-hold hold-animate';
        div.innerHTML = shapes[i % shapes.length];
        
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        // Increased opacity range to 0.3 - 0.5
        const op = 0.3 + (Math.random() * 0.2); 
        
        div.style.cssText = `
          left: ${x}%; top: ${y}%;
          width: ${70 + Math.random()*50}px;
          --hold-opacity: ${op};
          --float-duration: ${18 + Math.random() * 15}s;
          --float-delay: ${Math.random() * -20}s;
          --start-rotation: ${Math.random()*360}deg;
          --drift-x: ${-30 + Math.random()*60}px;
          --drift-y: ${-30 + Math.random()*60}px;
          animation-delay: ${i*0.15}s;
        `;
        container.appendChild(div);
      }
    }

    // 3. INIT
    function initHeader() {
      const h = document.getElementById('siteHeader');
      window.addEventListener('scroll', () => {
        window.pageYOffset > 100 ? h.classList.add('scrolled') : h.classList.remove('scrolled');
      }, {passive:true});
    }

    document.addEventListener('DOMContentLoaded', () => {
      generateHolds();
      renderMoveCards();
      initHeader();
    });
  </script>
</body>
</html>
